name: Sync Fork
on:
 schedule:
   - cron: '0 0 * * *' # runs every day at midnight
 workflow_dispatch: # allows manual triggering
jobs:
 sync:
   runs-on: ubuntu-latest
   steps:
     - uses: tgymnich/fork-sync@v1.8
       with:
         owner: umami-software
         base: master
         head: master
